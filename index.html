<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Baby Manuel 👶</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    touch-action: none;
}

body{
    background:#fdf7ef;
    overflow:hidden;
    font-family:Arial,sans-serif;
    position: fixed;
    width: 100%;
    height: 100%;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
    background:linear-gradient(#dff5ff,#fff8e8);
}

#baby{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:60px;
    user-select: none;
    transition: left 0.05s linear;
}

.item{
    position:absolute;
    font-size:40px;
    user-select: none;
}

#score{
    position:absolute;
    top:20px;
    left:20px;
    font-size:28px;
    font-weight:bold;
    color:#6b3f2d;
    user-select: none;
}

#message{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:30px;
    border-radius:20px;
    display:none;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,.2);
    z-index: 10;
    width: 85%;
    max-width: 400px;
}

#restart-btn {
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 18px;
    font-weight: bold;
    background: #6b3f2d;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>
<body>

<div id="game">

<div id="score">Pontos: 0</div>

<div id="baby">👶</div>

<div id="message"></div>

</div>

<script>

const baby = document.getElementById("baby");
const scoreEl = document.getElementById("score");
const msg = document.getElementById("message");

let score = 0;
let babyX = window.innerWidth / 2;
const speed = 25; 
let activeIntervals = [];
let gameTimeout; // Controla o tempo de spawn dinâmico
let isGameOver = false;

// Configurações de Dificuldade Progressiva
function getGameSettings() {
    // Base: queda a cada 20ms mudando 5px. Vamos aumentar os pixels de queda com os pontos.
    let fallSpeed = 5; 
    let spawnRate = 900; // milissegundos entre itens

    if (score >= 35) {
        fallSpeed = 10;
        spawnRate = 350;
    } else if (score >= 25) {
        fallSpeed = 8;
        spawnRate = 450;
    } else if (score >= 15) {
        fallSpeed = 7;
        spawnRate = 600;
    } else if (score >= 5) {
        fallSpeed = 6;
        spawnRate = 750;
    }

    return { fallSpeed, spawnRate };
}

function updateBabyPosition() {
    const babyWidth = baby.offsetWidth || 60;
    if (babyX < babyWidth / 2) babyX = babyWidth / 2;
    if (babyX > window.innerWidth - babyWidth / 2) babyX = window.innerWidth - babyWidth / 2;
    
    baby.style.left = babyX + "px";
}

// Controlos
document.addEventListener("mousemove",(e)=>{
    if (isGameOver) return;
    babyX = e.clientX;
    updateBabyPosition();
});

document.addEventListener("touchmove",(e)=>{
    if (isGameOver) return;
    babyX = e.touches[0].clientX;
    updateBabyPosition();
}, { passive: true });

document.addEventListener("keydown", (e) => {
    if (isGameOver) return;
    if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") {
        babyX -= speed;
        updateBabyPosition();
    } else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") {
        babyX += speed;
        updateBabyPosition();
    }
});

// Criar itens e agendar o próximo com base na dificuldade atual
function spawnLoop() {
    if (isGameOver) return;
    
    createItem();
    
    // Calcula a velocidade de spawn atual baseada nos pontos
    const settings = getGameSettings();
    gameTimeout = setTimeout(spawnLoop, settings.spawnRate);
}

function createItem(){
    if (isGameOver) return;

    const item = document.createElement("div");
    // Aumenta ligeiramente a hipótese de cocó quando tem muitos pontos
    const poopChance = score > 20 ? 0.35 : 0.25;
    const good = Math.random() > poopChance;

    item.innerHTML = good
        ? (Math.random() > 0.5 ? "🍼" : "🧸")
        : "💩";

    item.classList.add("item");

    let x = Math.random() * (window.innerWidth - 40);
    item.style.left = x + "px";
    item.style.top = "-50px";

    document.getElementById("game").appendChild(item);

    let y = -50;
    const settings = getGameSettings();

    const fall = setInterval(()=>{
        if (isGameOver) {
            clearInterval(fall);
            return;
        }

        y += settings.fallSpeed;
        item.style.top = y + "px";

        const babyRect = baby.getBoundingClientRect();
        const itemRect = item.getBoundingClientRect();

        if(
            itemRect.bottom > babyRect.top &&
            itemRect.top < babyRect.bottom &&
            itemRect.left < babyRect.right &&
            itemRect.right > babyRect.left
        ) {
            if(item.innerHTML === "💩"){
                endGame();
            } else {
                score++;
                scoreEl.innerHTML = "Pontos: " + score;
            }

            item.remove();
            clearInterval(fall);
        }

        if(y > window.innerHeight){
            item.remove();
            clearInterval(fall);
        }

    }, 20);

    activeIntervals.push(fall);
}

function startGame() {
    score = 0;
    isGameOver = false;
    babyX = window.innerWidth / 2;
    updateBabyPosition();
    scoreEl.innerHTML = "Pontos: 0";
    msg.style.display = "none";
    
    document.querySelectorAll('.item').forEach(item => item.remove());
    
    // Inicia o ciclo dinâmico
    spawnLoop();
}

function getEndingMessage(finalScore) {
    if (finalScore === 0) {
        return `
            <h2>💩 Mas o que é isto?</h2>
            <br>
            <p>Fizeste <strong>0 pontos</strong>. Agarraste logo o primeiro presente que caiu do céu? O Baby Manuel está desapontado.</p>
            <br>
            <p>🚨 <strong>Castigo:</strong> Vais carregar as grades de cerveja sozinho!</p>
        `;
    } else if (finalScore < 10) {
        return `
            <h2>👶 Baby Manuel chora...</h2>
            <br>
            <p>Conseguiste apenas <strong>${finalScore}</strong> pontos.</p>
            <br>
            <p>O bebé ficou com fome e cheio de tédio. Precisas de treinar esses reflexos antes do churrasco!</p>
        `;
    } else if (finalScore <= 15) {
        return `
            <h2>👍 Nem bom, nem mau</h2>
            <br>
            <p>Fizeste <strong>${finalScore}</strong> pontos.</p>
            <br>
            <p>Escapaste ao cocó por pouco, mas ainda não estás no topo.</p>
            <p>Fica com a tua bifana normal (sem direito a repetição!).</p>
        `;
    } else if (finalScore <= 30) {
        return `
            <h2>🥩 Baby Manuel agradece!</h2>
            <br>
            <p>Grande nível! Conseguiste <strong>${finalScore}</strong> pontos.</p>
            <br>
            <p><strong>Como prometido:</strong> Fizeste mais de 15 pontos, mereces uma bifana extra no churrasco! Com muito piripiri!</p>
        `;
    } else {
        return `
            <h2>👑 LENDA DO CHURRASCO!</h2>
            <br>
            <p>Incrível! Fizeste <strong>${finalScore}</strong> pontos!</p>
            <br>
            <p>Com esta velocidade, o Baby Manuel já está lavado, alimentado e pronto para a faculdade.</p>
            <p>🏆 Tens direito a lugar VIP ao lado do grelhador e controlo total da playlist!</p>
        `;
    }
}

function endGame(){
    isGameOver = true;
    clearTimeout(gameTimeout);
    
    activeIntervals.forEach(clearInterval);
    activeIntervals = [];

    msg.style.display = "block";
    msg.innerHTML = getEndingMessage(score) + `<button id="restart-btn" onclick="startGame()">Tentar Outra Vez</button>`;
}

startGame();
window.addEventListener('resize', updateBabyPosition);

</script>

</body>
</html>
